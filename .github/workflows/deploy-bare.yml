name: Deploy to domain (no-Docker)

# Push-to-deploy pipeline for the bare (Node + systemd + nginx) host. On every push to main:
# run the full gate, then SSH to the server and redeploy (pull + rebuild + restart auj).
# Requires repo secrets: DEPLOY_HOST, DEPLOY_SSH_KEY (private key) — optional DEPLOY_USER (root),
# DEPLOY_PATH (/root/auj). Without them, the gate still runs and the deploy step is skipped.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-domain
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    # Reads the DEPLOY_* secrets from the GitHub Environment named EN_AUJ.
    environment: EN_AUJ
    steps:
      - name: Guard — require deploy secrets
        id: guard
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ] && { [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ] || [ -n "${{ secrets.DEPLOY_PASSWORD }}" ]; }; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Set DEPLOY_HOST + (DEPLOY_PASSWORD or DEPLOY_SSH_KEY) secrets to enable auto-deploy. Skipping."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Redeploy on the server
        if: steps.guard.outputs.ready == 'true'
        env:
          SSHPASS: ${{ secrets.DEPLOY_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          HOST="${{ secrets.DEPLOY_USER || 'root' }}@${{ secrets.DEPLOY_HOST }}"
          # LOGIN shell (bash -lc) so the server PATH (node/pnpm/corepack) loads. Pull FIRST so
          # infra/redeploy.sh exists even on an older clone, then run it. A remote DATABASE_URL secret
          # (if set) is forwarded as AUJ_DATABASE_URL; empty → redeploy.sh falls back to local Postgres.
          CMD="AUJ_DATABASE_URL='${DATABASE_URL}' bash -lc 'cd ${{ secrets.DEPLOY_PATH || '/root/auj' }} && git fetch origin --quiet && git reset --hard --quiet origin/main && bash infra/redeploy.sh'"
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
            ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new "$HOST" "$CMD"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
            sshpass -e ssh -o StrictHostKeyChecking=accept-new "$HOST" "$CMD"
          fi
