name: Deploy

# Build + push the unified web image to GHCR on a version tag, then (if deploy secrets
# are configured) SSH to the server and roll the compose stack.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}-web

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: image
    # Configure these repo secrets to enable remote deploy:
    #   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY  (and GHCR read access on the server)
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Guard — require deploy secrets
        id: guard
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "No DEPLOY_HOST secret set — skipping remote deploy (image was pushed)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up SSH
        if: steps.guard.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Copy compose + deploy script
        if: steps.guard.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'mkdir -p ~/auj/infra'
          scp -i ~/.ssh/id_ed25519 infra/docker-compose.yml infra/deploy.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/auj/infra/"
      - name: Pull + restart on server
        if: steps.guard.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ~/auj/infra && export WEB_IMAGE='${{ env.IMAGE }}:latest' && bash deploy.sh"
