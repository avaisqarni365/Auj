<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
  ::selection{background:#C8A24A;color:#07301E;}
  .hw-list::-webkit-scrollbar{width:8px;}
  .hw-list::-webkit-scrollbar-thumb{background:#E0D6C4;border-radius:8px;}
  @media (max-width:840px){ .hw-body{flex-direction:column!important;} .hw-stage{min-height:200px!important;} .hw-list{max-height:none!important;} }
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</helmet>

<div style="min-height:100vh;background:radial-gradient(120% 90% at 50% 0%, #FFFDF8 0%, #F3EEE4 100%);font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding:clamp(20px,4vw,48px) clamp(14px,4vw,32px);display:flex;flex-direction:column;align-items:center;">

  <div style="width:100%;max-width:1040px;background:#fff;border:1px solid #E6DDCE;border-radius:24px;overflow:hidden;box-shadow:0 40px 90px -40px rgba(42,38,32,0.5), 0 2px 6px rgba(42,38,32,0.04);">

    <!-- HEADER -->
    <div style="position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:15px 20px;background:radial-gradient(130% 230% at 88% -70%, #1C7A4F 0%, #0A3D26 56%, #06251A 100%);overflow:hidden;">
      <div style="position:absolute;inset:0;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 11px);pointer-events:none;"></div>
      <div style="position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,rgba(200,162,74,0.6),transparent);"></div>
      <div style="position:relative;display:flex;align-items:center;gap:12px;">
        <span style="display:inline-flex;align-items:center;background:#FFFDF8;border:1px solid rgba(255,255,255,0.55);border-radius:9px;padding:5px 10px;box-shadow:0 10px 26px -8px rgba(0,0,0,0.45);"><img src="assets/auj-logo-trim.png" alt="AUJ" style="height:clamp(42px,6vw,58px);width:auto;display:block;" /></span>
        <div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.1em;color:#E8C36A;">TRANSPORT</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#BFE0CD;margin-top:2px;">OPTIONS · FARES · COMPANIES</div>
        </div>
      </div>
      <span style="position:relative;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);padding:6px 11px;border-radius:999px;">{{ counter }}</span>
    </div>

    <!-- DISTANCE RAIL -->
    <div style="position:relative;padding:18px 22px;border-bottom:1px solid #F1EADD;overflow-x:auto;background:#FCFAF5;">
      <div style="position:relative;display:flex;gap:4px;min-width:680px;">
        <div style="position:absolute;left:14px;right:14px;top:14px;height:2px;background:#EADFCE;"></div>
        <sc-for list="{{ rail }}" as="s" hint-placeholder-count="6">
          <button onClick="{{ s.onClick }}" style="position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;">
            <div style="width:30px;height:30px;border-radius:50%;background:{{ s.dotBg }};border:2px solid {{ s.dotBorder }};color:{{ s.dotFg }};display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;transition:all .2s;">{{ s.num }}</div>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:{{ s.labelColor }};text-align:center;line-height:1.2;white-space:nowrap;">{{ s.short }}</span>
          </button>
        </sc-for>
      </div>
    </div>

    <!-- BODY -->
    <div class="hw-body" style="display:flex;flex-wrap:wrap;">

      <!-- DISTANCE PANEL -->
      <div class="hw-stage" style="position:relative;flex:1 1 300px;min-height:300px;background:radial-gradient(120% 130% at 75% 12%, #156440 0%, #0A3D26 52%, #06251A 100%);overflow:hidden;color:#EFF6F1;padding:clamp(22px,2.6vw,30px);display:flex;flex-direction:column;justify-content:space-between;">
        <div style="position:absolute;inset:0;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 12px);pointer-events:none;"></div>
        <div style="position:absolute;top:-50px;right:-44px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, rgba(200,162,74,0.22), transparent 70%);pointer-events:none;"></div>
        <div style="position:relative;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;color:#9CC6AE;">GETTING AROUND</div>
        <div style="position:relative;">
          <div style="font-family:'IBM Plex Serif',serif;font-size:clamp(22px,3.2vw,32px);font-weight:600;line-height:1.12;">{{ dist }}</div>
          <div style="display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="#E8C36A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3.5l2 3-2 3 3 4-1 3"/><circle cx="9" cy="3.2" r="1.4"/></svg>{{ walk }}
          </div>
          <div style="font-size:14px;color:#C6DDCF;margin-top:14px;line-height:1.5;">{{ area }}</div>
        </div>
        <div style="position:relative;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#BFE0CD;">{{ count }} OPTIONS</div>
      </div>

      <!-- HOTEL LIST -->
      <div style="flex:1 1 360px;padding:clamp(20px,2.4vw,26px);display:flex;flex-direction:column;min-width:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;">
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;color:#2F6F8F;">BAND {{ stepNum }} OF {{ totalNum }} · {{ bandName }}</span>
        </div>
        <div class="hw-list" style="display:flex;flex-direction:column;gap:9px;max-height:330px;overflow-y:auto;padding-right:4px;">
          <sc-for list="{{ hotels }}" as="h" hint-placeholder-count="6">
            <div style="display:flex;align-items:center;gap:12px;padding:11px 13px;border:1px solid #F1EADD;border-radius:12px;background:#FFFDFA;">
              <div style="width:44px;height:44px;border-radius:11px;background:#DCEDE4;color:#0F5132;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0;">{{ h.stars }}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:14px;font-weight:600;color:#2A2620;line-height:1.25;">{{ h.name }}</div>
                <div style="font-size:12px;color:#7A7263;margin-top:1px;">{{ h.note }}</div>
              </div>
              <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#156440;white-space:nowrap;flex-shrink:0;">{{ h.dist }}</div>
            </div>
          </sc-for>
        </div>
        <div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <button onClick="{{ prev }}" style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;background:{{ prevBg }};color:{{ prevColor }};border:1.5px solid {{ prevBorder }};border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;padding:11px 16px;transition:all .15s;"><span>←</span> Back</button>
          <div style="display:flex;align-items:center;gap:7px;">
            <sc-for list="{{ dots }}" as="d" hint-placeholder-count="6">
              <button onClick="{{ d.onClick }}" style="cursor:pointer;border:none;height:9px;width:{{ d.w }};border-radius:999px;background:{{ d.bg }};transition:all .2s;padding:0;"></button>
            </sc-for>
          </div>
          <button onClick="{{ next }}" style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;background:#0F5132;color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;padding:11px 18px;box-shadow:0 8px 18px rgba(15,81,50,0.26);transition:background .15s;" style-hover="background:#156440;">{{ nextLabel }} <span>→</span></button>
        </div>
      </div>
    </div>
  </div>

  <div style="margin-top:18px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;">
    <a href="AUJ Landing Cinematic.dc.html" style="text-decoration:none;font-size:13.5px;color:#7A7263;display:inline-flex;align-items:center;gap:6px;">← Back to AUJ home</a>
    <a href="AUJ Food Guide.dc.html" style="text-decoration:none;font-size:13.5px;font-weight:600;color:#156440;display:inline-flex;align-items:center;gap:6px;">Food &amp; dining <span>→</span></a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:760}}">
class Component extends DCLogic {
  state = { i: 0 };

  data() {
    return [
      { short: 'Rail', dist: 'Haramain High-Speed Rail', walk: '300 km/h · 4 cities', area: 'The high-speed train linking Jeddah airport, Makkah, KAEC and Madinah — the fastest way between the two holy cities.', name: 'HARAMAIN RAIL',
        hotels: [
          { name: 'Makkah ↔ Madinah', stars: 'HHR', note: '~2h 20m · several daily', dist: 'fr SAR 150' },
          { name: 'Jeddah Airport ↔ Makkah', stars: 'HHR', note: '~1 hour', dist: 'fr SAR 40' },
          { name: 'Jeddah ↔ Madinah', stars: 'HHR', note: '~2 hours', dist: 'fr SAR 120' },
          { name: 'Economy & Business class', stars: 'CLS', note: 'Reserved seats, luggage', dist: 'Class' },
          { name: 'Book: sar.hhr.sa or app', stars: 'BK', note: 'Reserve early in peak season', dist: 'Online' }
        ] },
      { short: 'Airport', dist: 'Airport transfers', walk: 'JED & MED airports', area: 'From Jeddah (JED) or Madinah (MED) airport to your hotel — by private car, rail or coach.', name: 'AIRPORT TRANSFERS',
        hotels: [
          { name: 'AUJ private transfer', stars: 'AUJ', note: 'Included in most packages', dist: 'incl.' },
          { name: 'Careem / Uber (JED → Makkah)', stars: 'APP', note: '~1.5 hours', dist: 'SAR 180–250' },
          { name: 'Airport taxi (fixed fare)', stars: 'TAXI', note: 'Counter outside arrivals', dist: 'SAR 200+' },
          { name: 'Haramain Rail from JED', stars: 'HHR', note: 'Station inside the airport', dist: 'fr SAR 40' },
          { name: 'SAPTCO airport coach', stars: 'BUS', note: 'Budget shared transfer', dist: 'fr SAR 25' }
        ] },
      { short: 'Ride-hailing', dist: 'Ride-hailing apps', walk: 'Pay by card or cash', area: 'Book a car on your phone in seconds — the easiest way to move around both cities.', name: 'RIDE-HAILING',
        hotels: [
          { name: 'Careem', stars: 'CRM', note: 'Most popular · super-app', dist: 'App' },
          { name: 'Uber', stars: 'UBR', note: 'Widely available', dist: 'App' },
          { name: 'Jeeny', stars: 'JNY', note: 'Local alternative', dist: 'App' },
          { name: 'City short hop', stars: 'FARE', note: 'Within Makkah / Madinah', dist: 'SAR 15–40' },
          { name: 'Airport ride (JED → Makkah)', stars: 'FARE', note: '~1.5 hours', dist: 'SAR 180–250' }
        ] },
      { short: 'Intercity bus', dist: 'Intercity coaches', walk: 'Between the cities', area: 'Comfortable air-conditioned coaches between Makkah, Madinah and Jeddah.', name: 'INTERCITY BUSES',
        hotels: [
          { name: 'SAPTCO', stars: 'SAP', note: 'National bus company', dist: 'SAR 80–120' },
          { name: 'Makkah ↔ Madinah coach', stars: 'BUS', note: '~6 hours', dist: 'fr SAR 90' },
          { name: 'Jeddah ↔ Makkah', stars: 'BUS', note: '~1.5 hours', dist: 'fr SAR 25' },
          { name: 'Private VIP coach (groups)', stars: 'VIP', note: 'Charter for your group', dist: 'Charter' }
        ] },
      { short: 'Local', dist: 'Local buses & shuttles', walk: 'Around the city', area: 'Getting around within each city, including hotel and Haram shuttle services.', name: 'LOCAL TRANSPORT',
        hotels: [
          { name: 'Makkah Bus (city network)', stars: 'BUS', note: 'Modern city routes', dist: 'SAR 3–5' },
          { name: 'Madinah Bus', stars: 'BUS', note: 'City network', dist: 'SAR 3–5' },
          { name: 'Hotel shuttle (Aziziyah/outer)', stars: 'SHL', note: 'To the Haram', dist: 'Free' },
          { name: 'Haram area shuttles', stars: 'SHL', note: 'Short hops', dist: 'Free/low' }
        ] },
      { short: 'Taxi & car', dist: 'Taxis & private cars', walk: 'Door to door', area: 'Street taxis and pre-booked private cars with a driver, for ziyarat and intercity trips.', name: 'TAXIS & PRIVATE CARS',
        hotels: [
          { name: 'White metered taxi', stars: 'TAXI', note: 'Street hail', dist: 'Meter' },
          { name: 'Private car + driver', stars: 'CAR', note: 'By the hour or day', dist: 'SAR/hr' },
          { name: 'Makkah ↔ Madinah private car', stars: 'CAR', note: '~4–5h door to door', dist: 'SAR 400–600' },
          { name: 'Ziyarat tour car (half day)', stars: 'TOUR', note: 'Guided sacred sites', dist: 'SAR 150–300' }
        ] }
    ];
  }

  renderVals() {
    const S = this.data();
    const total = S.length;
    const i = Math.max(0, Math.min(this.state.i, total - 1));
    const b = S[i];
    const pad2 = (n) => ('0' + n).slice(-2);

    const rail = S.map((s, k) => ({
      num: pad2(k + 1), short: s.short,
      onClick: () => this.setState({ i: k }),
      dotBg: k === i ? '#0F5132' : (k < i ? '#DCEDE4' : '#fff'),
      dotBorder: k === i ? '#0F5132' : (k < i ? '#9CC6AE' : '#E6DDCE'),
      dotFg: k === i ? '#fff' : (k < i ? '#0F5132' : '#9A9183'),
      labelColor: k === i ? '#0F5132' : '#9A9183'
    }));
    const dots = S.map((_, k) => ({
      onClick: () => this.setState({ i: k }),
      bg: k === i ? '#0F5132' : (k < i ? '#9CC6AE' : '#E6DDCE'),
      w: k === i ? '26px' : '9px'
    }));

    return {
      counter: pad2(i + 1) + ' / ' + pad2(total),
      stepNum: pad2(i + 1), totalNum: pad2(total),
      dist: b.dist, walk: b.walk, area: b.area, bandName: b.name,
      count: b.hotels.length, hotels: b.hotels,
      rail, dots,
      prev: () => this.setState({ i: Math.max(0, i - 1) }),
      next: () => this.setState({ i: Math.min(total - 1, i + 1) }),
      prevBg: i === 0 ? '#F4EEE3' : '#fff',
      prevColor: i === 0 ? '#B8AE9C' : '#156440',
      prevBorder: i === 0 ? '#EADFCE' : '#C9BCA6',
      nextLabel: i === total - 1 ? 'Done' : 'Next'
    };
  }
}
</script>
</body>
</html>
