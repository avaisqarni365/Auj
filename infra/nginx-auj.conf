# AUJ reverse proxy for an EXISTING host nginx (Ubuntu) — the AUJ app runs in Docker
# bound to 127.0.0.1:3000 (see docker-compose.yml, web service, no --profile caddy).
#
# Install:
#   sudo cp infra/nginx-auj.conf /etc/nginx/sites-available/auj.codes-ai.uk
#   sudo ln -s /etc/nginx/sites-available/auj.codes-ai.uk /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d auj.codes-ai.uk        # obtains the cert + wires ssl_* lines
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name auj.codes-ai.uk;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name auj.codes-ai.uk;

    # Managed by certbot (`certbot --nginx -d auj.codes-ai.uk` fills these in):
    ssl_certificate     /etc/letsencrypt/live/auj.codes-ai.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auj.codes-ai.uk/privkey.pem;

    client_max_body_size 25m;   # passport / photo uploads

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
