# AUJ reverse proxy for an EXISTING host nginx (Ubuntu). The AUJ app runs in Docker bound to
# 127.0.0.1:3000. This is an HTTP-only vhost on purpose — run `certbot --nginx -d auj.codes-ai.uk`
# afterwards and certbot adds the :443 server block, the certificate, and the http→https redirect.
# It's additive (a new server_name), so it won't affect other sites already on this nginx.
#
# Install:
#   sudo cp infra/nginx-auj.conf /etc/nginx/sites-available/auj.codes-ai.uk
#   sudo ln -s /etc/nginx/sites-available/auj.codes-ai.uk /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d auj.codes-ai.uk

server {
    listen 80;
    listen [::]:80;
    server_name auj.codes-ai.uk;

    client_max_body_size 25m;   # passport / photo uploads

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
