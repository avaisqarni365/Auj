<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — AUJ</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #ece7dd;
             font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #2a2620; }
      .card { max-width: 30rem; padding: 2rem; text-align: center; }
      h1 { font-size: 1.5rem; margin: 0.5rem 0; color: #0f5132; }
      p { line-height: 1.6; color: #57534e; }
      button { margin-top: 1rem; padding: 0.7rem 1.4rem; border: 0; border-radius: 0.75rem;
               background: #0f5132; color: #fff; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 2.5rem">🕋</div>
      <h1>You’re offline</h1>
      <p>Pages you’ve already opened — including your Umrah Guide steps, du‘as and recordings — stay
        available on this device. Reconnect to load anything new.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
